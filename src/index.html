<!doctype html>
<html>
  <head>
    <title>Madison Swain-Bowden</title>
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <link
      rel="stylesheet"
      href="https://unpkg.com/modern-normalize@3.0.0/modern-normalize.css"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inconsolata:wght@200..900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./style.css" />
    <!-- Favicon info -->
    <link
      rel="icon"
      type="image/png"
      href="./images/favicon-96x96.png"
      sizes="96x96"
    />
    <link rel="icon" type="image/svg+xml" href="./images/favicon.svg" />
    <link rel="shortcut icon" href="./images/favicon.ico" />
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="./images/apple-touch-icon.png"
    />
    <link rel="manifest" href="./images/site.webmanifest" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/styles/atom-one-dark.min.css"
    />
    <style>
      /* Adjust highlight.js background to match site's black background */
      .hljs,
      pre code.hljs {
        background-color: #111 !important;
        padding: 1em;
        border-radius: 4px;
      }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/highlight.min.js"></script>
    <script>
      // Initialize highlight.js when the DOM is fully loaded
      document.addEventListener("DOMContentLoaded", (event) => {
        // Initial highlighting
        document.querySelectorAll("pre code").forEach((block) => {
          hljs.highlightElement(block);
        });

        // Set up a MutationObserver to highlight code that appears later (via terminal commands)
        const observer = new MutationObserver((mutations) => {
          mutations.forEach((mutation) => {
            if (mutation.type === "childList") {
              mutation.addedNodes.forEach((node) => {
                if (node.nodeType === 1) {
                  // Element node
                  const codeBlocks = node.querySelectorAll("pre code");
                  if (codeBlocks.length > 0) {
                    codeBlocks.forEach((block) => {
                      hljs.highlightElement(block);
                    });
                  }
                }
              });
            }
          });
        });

        // Start observing the terminal for new code blocks
        observer.observe(document.getElementById("terminal"), {
          childList: true,
          subtree: true,
        });
      });
    </script>
  </head>

  <body>
    <main>
      <template id="template-files">
        <!--files-->
      </template>
      <template id="template-prompt">
        <div class="entry">
          <span class="prompt"
            ><a
              class="prompt-link"
              href="mailto:madison+website@aetherunbound.net"
            >
              <span class="prompt-username">madison</span
              ><span class="prompt-hostname">@aetherunbound.net</span></a
            >:<span class="prompt-path">~</span>$
          </span>
          <span class="prompt-input" contenteditable></span>
        </div>
      </template>
      <div id="terminal"></div>
    </main>
    <div class="mastodon-verify">
      <a rel="me" href="https://hachyderm.io/@aether"></a>
    </div>
    <script src="term.js" type="module"></script>
  </body>
</html>
